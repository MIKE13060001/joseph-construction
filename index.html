        const TypewriterTitle = ({ text }) => {
            const [displayedText, setDisplayedText] = useState('');
            const [isVisible, setIsVisible] = useState(false);
            const domRef = React.useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    if (entries[0].isIntersecting) {
                        setIsVisible(true);
                        observer.unobserve(domRef.current);
                    }
                }, { threshold: 0.1 });
                
                const currentRef = domRef.current;
                if (currentRef) observer.observe(currentRef);
                
                return () => {
                    if (currentRef) observer.unobserve(currentRef);
                };
            }, []);

            useEffect(() => {
                if (isVisible) {
                    let i = 0;
                    const interval = setInterval(() => {
                        setDisplayedText(text.slice(0, i + 1));
                        i++;
                        if (i >= text.length) clearInterval(interval);
                    }, 40);
                    return () => clearInterval(interval);
                }
            }, [isVisible, text]);

            return (
                <h3 ref={domRef} className="text-3xl font-bold mb-4 min-h-[40px]">
                    {displayedText || '\u00A0'}
                </h3>
            );
        };

        );

        const ProjectsSection = ({ onProjectClick }) => (
            <section className="py-24 bg-white">
                <div className="max-w-7xl mx-auto px-12 text-center mb-16">
                    <span className="badge-blue text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-6 inline-block">Projects</span>
                    <h2 className="text-5xl font-bold mb-4">Projects we're proud of</h2>
                    <a href="#" className="text-sm font-semibold hover:underline">View All Projects →</a>
                </div>
                <div className="max-w-7xl mx-auto px-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-12">
                    {[
                        { title: 'Skyline Corporate Tower', loc: 'London, UK', weeks: '5 weeks', sqft: '120000', img: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=600' },
                        { title: 'Harbor View Apartments', loc: 'Tokyo, Japan', weeks: '4 weeks', sqft: '85000', img: 'https://images.unsplash.com/photo-1449156001437-3a1661dc926b?auto=format&fit=crop&q=80&w=600' },
                        { title: 'Metro Business Hub', loc: 'New York, USA', weeks: '3 weeks', sqft: '95000', img: 'https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&q=80&w=600' }
                    ].map((project, idx) => (
                        <div key={idx} className="group cursor-pointer" onClick={() => onProjectClick(project)}>
                            <div className="relative overflow-hidden rounded-[2.5rem] mb-6">
                                <img src={project.img} className="w-full h-80 object-cover transition duration-500 group-hover:scale-105" />
                                <div className="absolute top-4 left-4 bg-white/90 px-4 py-1.5 rounded-full flex items-center text-[10px] font-bold">
                                    <i className="fas fa-map-marker-alt mr-2 text-gray-400"></i>{project.loc}
                                </div>
                            </div>
                            <h4 className="text-xl font-bold mb-2">{project.title}</h4>
                            <div className="flex items-center space-x-4 text-gray-400 text-xs">
                                <span><i className="far fa-clock mr-2"></i>{project.weeks}</span>
                                <span>•</span>
                                <span><i className="fas fa-expand-arrows-alt mr-2"></i>{project.sqft} sq: ft</span>
                            </div>
                        </div>
                    ))}
                </div>
            </section>
        );

        const WhyUsSection = () => (
            <section className="py-24 max-w-7xl mx-auto px-12 grid grid-cols-2 gap-20 items-center">
                <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&q=80&w=1200" className="w-full h-[600px] object-cover rounded-[40px] shadow-lg" />
                <div>
                    <span className="badge-blue text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-6 inline-block">Why choose us</span>
                    <h2 className="text-5xl font-bold mb-6 leading-tight">Why we're your trusted partner in construction</h2>
                    <ul className="space-y-4 mb-10">
                        {['Consistently high-quality work', 'Reliable on-time project delivery', 'Personalized client-focused service'].map((item, i) => (
                            <li key={i} className="flex items-center text-sm font-medium text-gray-700">
                                <div className="w-5 h-5 rounded-full bg-blue-50 flex items-center justify-center mr-3"><i className="fas fa-check text-blue-500 text-[10px]"></i></div>{item}
                            </li>
                        ))}
                    </ul>
                    <button className="bg-navy text-white px-8 py-3 rounded-full text-sm font-semibold flex items-center transition hover:opacity-90"><span className="mr-2 w-1.5 h-1.5 bg-white rounded-full"></span>Contact Us</button>
                </div>
            </section>
        );

        const StatsSection = () => (
            <section className="py-16 max-w-7xl mx-auto px-12 flex justify-between items-center text-center">
                {['250+', '10+', '98%', '24/7'].map((stat, i) => (
                    <React.Fragment key={i}>
                        <div className="flex-1"><div className="text-5xl font-bold mb-2">{stat}</div><div className="text-xs text-gray-400 font-medium">Metric Title</div></div>
                        {i < 3 && <div className="w-1.5 h-1.5 bg-navy rounded-full"></div>}
                    </React.Fragment>
                ))}
            </section>
        );

        const TestimonialsSection = () => (
            <section className="py-24 bg-white text-center">
                <span className="badge-blue text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-6 inline-block">Testimonials</span>
                <h2 className="text-5xl font-bold mb-16">Real stories from people we worked with</h2>
                <div className="max-w-7xl mx-auto px-12 grid grid-cols-3 gap-6 mb-12">
                    {[1, 2, 3].map(i => (
                        <div key={i} className="relative h-[450px] rounded-3xl overflow-hidden shadow-sm">
                            <img src={`https://images.unsplash.com/photo-${i === 1 ? '1472099645785-5658abf4ff4e' : i === 2 ? '1517841905240-472988babdf9' : '1507003211169-0a1dd7228f2d'}?auto=format&fit=crop&q=80&w=600`} className="w-full h-full object-cover" />
                            <div className="absolute inset-x-4 bottom-4 bg-white/10 backdrop-blur-md border border-white/20 p-6 rounded-2xl text-white text-left">
                                <p className="text-xs mb-4 leading-relaxed font-medium">"Their design skills truly impressed me, making our website modern and easy to navigate."</p>
                                <p className="text-xs font-bold">— User Name</p>
                            </div>
                        </div>
                    ))}
                </div>
            </section>
        );

        const BlogsSection = () => (
            <section className="py-24 bg-white">
                <div className="max-w-7xl mx-auto px-12 text-center mb-16">
                    <span className="badge-blue text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-6 inline-block">Blogs</span>
                    <h2 className="text-5xl font-bold mb-4">Insights and Updates</h2>
                    <a href="#" className="text-sm font-semibold hover:underline">View All Blogs →</a>
                </div>
                <div className="max-w-7xl mx-auto px-12 grid grid-cols-3 gap-8">
                    {[
                        { title: 'Building the Future of Residential Spaces', category: 'Residential', img: 'https://images.unsplash.com/photo-1541888946425-d81bb19480c5?auto=format&fit=crop&q=80&w=800' },
                        { title: 'Shaping the Skyline with Commercial Construction', category: 'Commercial', img: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=800' },
                        { title: 'Transforming Spaces with Interior Fit-Out Excellence', category: 'Interior', img: 'https://images.unsplash.com/photo-1513584684031-434524ca01d1?auto=format&fit=crop&q=80&w=800' }
                    ].map((blog, idx) => (
                        <div key={idx} className="group cursor-pointer">
                            <div className="rounded-[2.5rem] overflow-hidden mb-6 h-64"><img src={blog.img} className="w-full h-full object-cover transition duration-500 group-hover:scale-105" /></div>
                            <span className="text-[10px] font-bold text-navy uppercase mb-3 block">{blog.category}</span>
                            <h4 className="text-xl font-bold mb-4">{blog.title}</h4>
                        </div>
                    ))}
                </div>
            </section>
        );

        const CTASection = () => (
            <section className="mx-12 mb-24 relative rounded-[60px] overflow-hidden bg-navy py-32 text-center text-white">
                <div className="relative z-10 max-w-2xl mx-auto px-6">
                    <div className="flex items-center justify-center space-x-1 mb-6">{[1, 2, 3, 4, 5].map(i => <i key={i} className="fas fa-star text-white text-[10px]"></i>)}</div>
                    <h2 className="text-6xl font-bold mb-6 tracking-tight">Build your dream project today with us</h2>
                    <button className="bg-white text-navy px-8 py-3 rounded-full text-sm font-bold flex items-center mx-auto transition-transform hover:scale-105"><span className="mr-2 w-1.5 h-1.5 bg-navy rounded-full"></span>Contact us</button>
                </div>
            </section>
        );

        const Footer = () => (
            <footer className="max-w-7xl mx-auto px-12 pb-24">
                <div className="bg-white rounded-[40px] p-16 border border-gray-50 flex flex-wrap justify-between shadow-sm">
                    <div className="max-w-xs mb-10"><div className="text-2xl font-extrabold tracking-tight mb-6">Brixora<span className="text-sm align-top">®</span></div><p className="text-gray-500 text-sm">A modern construction template for innovative projects.</p></div>
                    <div className="flex space-x-20">
                        <div><h5 className="font-bold text-sm mb-6">Pages</h5><ul className="space-y-4 text-gray-400 text-sm"><li>Home</li><li>About</li><li>Services</li></ul></div>
                        <div><h5 className="font-bold text-sm mb-6">Follow</h5><ul className="space-y-4 text-gray-400 text-sm"><li>Facebook</li><li>Linkedin</li><li>Twitter</li></ul></div>
                    </div>
                </div>
            </footer>
        );

        const MarqueeSection = () => {
            const items = ['Approche environnementale', 'Un style unique', 'Matériaux hauts de gammes', 'Artisanat Français'];
            const repeatedItems = [...items, ...items, ...items, ...items, ...items, ...items, ...items, ...items];
            return (
                <div className="w-full overflow-hidden bg-white pt-8 flex items-center mb-16">
                    <div className="flex animate-marquee w-max">
                        {repeatedItems.map((item, idx) => (
                            <div key={idx} className="flex items-center">
                                <span className="text-3xl font-medium text-gray-800 tracking-tight">{item}</span>
                                <i className="fas fa-asterisk text-navy mx-16 text-lg opacity-40"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [selectedProject, setSelectedProject] = useState(null);

            useEffect(() => { window.scrollTo(0, 0); }, [view, selectedProject]);

            const navigate = (v) => { setView(v); setSelectedProject(null); };

            if (view === 'projectDetail' && selectedProject) {
                return <ProjectDetail project={selectedProject} onBack={() => setView('home')} onNavigate={navigate} />;
            }
            if (view === 'blogs') {
                return <BlogsPage onNavigate={navigate} />;
            }
            if (view === 'services') {
                return <ServicesPage onNavigate={navigate} />;
            }

            return (
                <div className="min-h-screen bg-white">
                    <Navbar onNavigate={navigate} />
                    <Hero />
                    <AboutSection />
                    <MarqueeSection />
                    <ServicesSection />
                    <ProjectsSection onProjectClick={(p) => { setSelectedProject(p); setView('projectDetail'); }} />
                    <WhyUsSection />
                    <StatsSection />
                    <TestimonialsSection />
                    <BlogsSection />
                    <CTASection />
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
