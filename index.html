        const TypewriterTitle = ({ text }) => {
            const [displayedText, setDisplayedText] = useState('');
            const [isVisible, setIsVisible] = useState(false);
            const domRef = React.useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(entries => {
                    if (entries[0].isIntersecting) {
                        setIsVisible(true);
                        observer.unobserve(domRef.current);
                    }
                }, { threshold: 0.1 });
                
                const currentRef = domRef.current;
                if (currentRef) observer.observe(currentRef);
                
                return () => {
                    if (currentRef) observer.unobserve(currentRef);
                };
            }, []);

            useEffect(() => {
                if (isVisible) {
                    let i = 0;
                    const interval = setInterval(() => {
                        setDisplayedText(text.slice(0, i + 1));
                        i++;
                        if (i >= text.length) clearInterval(interval);
                    }, 40);
                    return () => clearInterval(interval);
                }
            }, [isVisible, text]);

            return (
                <h3 ref={domRef} className="text-3xl font-bold mb-4 min-h-[40px]">
                    {displayedText || '\u00A0'}
                </h3>
            );
        };

                <div className="max-w-4xl mx-auto px-12 pb-24">
                    <div className="prose prose-lg max-w-none text-gray-600">
                        {blog.content.map((block, i) => {
                            if (block.type === 'p') return <p key={i} className="mb-6 leading-relaxed text-left text-sm">{block.text}</p>;
                            if (block.type === 'h3') return <h3 key={i} className="text-3xl font-bold mb-6 mt-12 text-navy text-left">{block.text}</h3>;
                            return null;
                        })}
                    </div>
                    <div className="mt-20 p-12 bg-blue-50/50 rounded-3xl text-center">
                        <h3 className="text-3xl font-bold text-navy mb-6">{blog.ctaText}</h3>
                        <button onClick={() => { window.location.href='mailto:contact@brixorav2.com'; }} className="bg-navy text-white px-8 py-4 rounded-full text-sm font-bold flex items-center justify-center mx-auto transition hover:opacity-95"><span className="mr-2 w-1.5 h-1.5 bg-white rounded-full"></span>Contactez-nous aujourd'hui</button>
                    </div>
                </div>
                <Footer />
            </div>
        );

        const Hero = () => (
            <section className="max-w-7xl mx-auto px-12 py-12 grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                <div>
                    <div className="flex items-center space-x-1 mb-4">
                        {[1, 2, 3, 4, 5].map(i => <i key={i} className="fas fa-star text-orange-400 text-xs"></i>)}
                        <span className="text-xs font-bold ml-2">4.9 / 5</span><span className="text-xs text-gray-400 ml-1">; Plus de 70 clients satisfaits</span>
                    </div>
                    <h1 className="text-6xl font-bold leading-[1.1] mb-6 tracking-tight">Votre entreprise de construction<br />de père en fils</h1>
                    <p className="text-gray-500 text-lg mb-8 max-w-md leading-relaxed">Nous construisons et rénovons votre maison à votre façon</p>
                    <div className="flex items-center space-x-6 mb-12">
                        <button className="bg-navy text-white px-8 py-3 rounded-full text-sm font-semibold flex items-center transition hover:opacity-90"><span className="mr-2 w-1.5 h-1.5 bg-white rounded-full"></span>Contact</button>
                        <button className="text-sm font-semibold flex items-center hover:underline">Nos réalisations <span className="ml-2">→</span></button>
                    </div>
                    <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-50 inline-flex items-center space-x-4 max-w-xs">
                        <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=200" alt="Sarah Dubosc" className="w-20 h-20 rounded-xl object-cover" />
                        <div>
                            <div className="flex items-center space-x-0.5 mb-1">{[1, 2, 3, 4, 5].map(i => <i key={i} className="fas fa-star text-orange-400 text-[10px]"></i>)}<span className="text-[10px] font-bold ml-1">4.9</span></div>
                            <h4 className="font-bold text-sm">Sarah Dubosc</h4><p className="text-[10px] text-gray-400 leading-tight">Particulier - Toulon</p>
                        </div>
                    </div>
                </div>
                <div className="relative">
                    <img src="./mason_background.png" alt="Construction site" className="rounded-[40px] w-full h-[600px] object-cover object-top shadow-2xl" />
                    <div className="absolute bottom-10 left-10 bg-white p-6 rounded-3xl shadow-xl w-64">
                        <h5 className="font-bold text-sm mb-4">Vos experts de la construction</h5>
                        <div className="space-y-4">
                            {[
                                { name: 'Sandrine Gras', role: 'Co-Fondatrice', img: './profile_sandrine.png' },
                                { name: 'Joseph Cannu', role: 'Président', img: './profile_joseph.png' },
                                { name: 'Thomas Dupont', role: 'Maçon', img: './profile_thomas.png' }
                            ].map((expert, idx) => (
                                <div key={idx} className={`flex items-center space-x-3 ${idx !== 2 ? 'pb-4 border-b border-gray-100' : ''}`}>
                                    <img src={expert.img} className="w-10 h-10 rounded-full object-cover" alt={expert.name} />
                                    <div><p className="text-xs font-bold">{expert.name}</p><p className="text-[10px] text-gray-400">{expert.role}</p></div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </section>
        );

        const AboutSection = () => (
            <section className="py-24 bg-white">
                <div className="max-w-4xl mx-auto px-12 text-center mb-16">
                    <span className="badge-blue text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-6 inline-block">A propos de Joseph Construction</span>
                    <h2 className="text-4xl font-semibold leading-snug tracking-tight">Depuis 2022, nous partons de vos idées, analysons chaque spécificité de votre projet, pour le réaliser comme vous en rêvez</h2>
                </div>
                <div className="max-w-7xl mx-auto px-12 grid grid-cols-4 gap-6">
                    <img src="./about_1.png" className="w-full h-80 object-cover rounded-3xl transition-transform duration-300 hover:scale-105 cursor-pointer" />
                    <img src="./about_2.png" className="w-full h-[400px] object-cover rounded-3xl transition-transform duration-300 hover:scale-105 cursor-pointer -mt-10" />
                    <img src="./about_3.png" className="w-full h-80 object-cover rounded-3xl transition-transform duration-300 hover:scale-105 cursor-pointer" />
                    <img src="./about_4.png" className="w-full h-80 object-cover rounded-3xl transition-transform duration-300 hover:scale-105 cursor-pointer" />
                </div>
            </section>
        );

        const ServicesSection = () => (
            <section className="py-24 bg-gray-50/30">
                <div className="max-w-7xl mx-auto px-12 text-center mb-16">
                    <span className="badge-blue text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-6 inline-block">Les services de Joseph Construction</span>
                    <h2 className="text-5xl font-bold mb-4">Ce que l'on fait, pour donner vie à vos envies</h2>
                    <p className="text-gray-500 max-w-xl mx-auto text-sm leading-relaxed mb-6">Des créations uniques de hautes qualités qui correspondent à la vision idéale de votre maison</p>
                    <a href="#" className="text-sm font-semibold hover:underline">Découvrir nos services →</a>
                </div>
                <div className="max-w-7xl mx-auto px-12 space-y-12">
                    {servicesData.map((service, idx) => (
                        <ServiceCard key={idx} {...service} reverse={idx % 2 !== 0} />
                    ))}
                </div>
            </section>
        );

        const ProjectsSection = ({ onProjectClick }) => (
            <section className="py-24 bg-white">
                <div className="max-w-7xl mx-auto px-12 text-center mb-16">
                    <span className="badge-blue text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-6 inline-block">Les projets de Joseph Construction</span>
                    <h2 className="text-5xl font-bold mb-4">Quelques unes de nos réalisations</h2>
                    <a href="#" className="text-sm font-semibold hover:underline">Voir toutes nos réalisations →</a>
                </div>
                <div className="max-w-7xl mx-auto px-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-12">
                    {projectsData.map((project, idx) => (
                        <div key={idx} className="group cursor-pointer" onClick={() => onProjectClick(project)}>
                            <div className="relative overflow-hidden rounded-[2.5rem] mb-6">
                                <img src={project.img} className="w-full h-80 object-cover transition duration-500 group-hover:scale-105" />
                                <div className="absolute top-4 left-4 bg-white/90 px-4 py-1.5 rounded-full flex items-center text-[10px] font-bold">
                                    <i className="fas fa-map-marker-alt mr-2 text-gray-400"></i>{project.loc}
                                </div>
                            </div>
                            <h4 className="text-xl font-bold mb-2 text-navy">{project.title}</h4>
                            <div className="flex items-center space-x-4 text-gray-400 text-xs">
                                <span><i className="far fa-clock mr-2"></i>{project.weeks}</span>
                                <span>•</span>
                                <span><i className="fas fa-expand-arrows-alt mr-2"></i>{project.sqft}</span>
                            </div>
                        </div>
                    ))}
                </div>
            </section>
        );

        const WhyUsSection = () => (
            <section className="py-24 max-w-7xl mx-auto px-12 grid grid-cols-2 gap-20 items-center">
                <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&q=80&w=1200" className="w-full h-[600px] object-cover rounded-[40px] shadow-lg" />
                <div>
                    <span className="badge-blue text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-6 inline-block">Pourquoi nous choisir ?</span>
                    <h2 className="text-5xl font-bold mb-6 leading-tight text-navy">Découvrez pourquoi plus de 70 clients nous font confiance</h2>
                    <ul className="space-y-4 mb-10">
                        {['Un travail de qualité, livré dans les délais.', 'Une étude minutieuse de vos projets', 'Une entreprise familiale depuis 2 générations'].map((item, i) => (
                            <li key={i} className="flex items-center text-sm font-medium text-gray-700">
                                <div className="w-5 h-5 rounded-full bg-blue-50 flex items-center justify-center mr-3"><i className="fas fa-check text-blue-500 text-[10px]"></i></div>{item}
                            </li>
                        ))}
                    </ul>
                    <button className="bg-navy text-white px-8 py-3 rounded-full text-sm font-bold flex items-center transition hover:opacity-90"><span className="mr-2 w-1.5 h-1.5 bg-white rounded-full"></span>Contactez-nous</button>
                </div>
            </section>
        );

        const TestimonialsSection = () => {
            const testimonials = [
                {
                    name: 'Mika - Marseille',
                    img: './mika_profile.jpg',
                    text: "Travailler avec Joseph Construction a été une révélation. 14 semaines pour une villa de cette envergure à Marseille, c'était un défi, mais ils l'ont relevé avec une précision millimétrée. Le résultat dépasse toutes nos attentes."
                },
                {
                    name: 'Maria - Ollioules',
                    img: './maria_profile.jpg',
                    text: "Une entreprise familiale qui a du cœur. Ils ont su respecter l'âme provençale de notre projet à Ollioules tout en y apportant une modernité incroyable. On sent les deux générations de savoir-faire dans chaque détail."
                },
                {
                    name: 'Sofia - Cannes',
                    img: './sofia_profile.jpg',
                    text: "Pour notre projet de prestige à Cannes, nous cherchions l'excellence. Joseph Construction a su gérer la complexité technique et le luxe des matériaux avec une aisance remarquable. Une confiance totale du début à la fin."
                }
            ];
            return (
                <section className="py-24 bg-white text-center">
                    <span className="badge-blue text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-6 inline-block">Témoignages</span>
                    <h2 className="text-5xl font-bold mb-16 text-navy">Quelques histoires bâties avec nos clients</h2>
                    <div className="max-w-7xl mx-auto px-12 grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                        {testimonials.map((t, i) => (
                            <div key={i} className="relative h-[450px] rounded-3xl overflow-hidden shadow-sm group">
                                <img src={t.img} className="w-full h-full object-cover transition duration-700 group-hover:scale-110" />
                                <div className="absolute inset-x-4 bottom-4 bg-navy/20 backdrop-blur-xl border border-white/20 p-6 rounded-2xl text-white text-left transition-transform duration-500 group-hover:-translate-y-2">
                                    <p className="text-xs mb-4 leading-relaxed font-medium italic">"{t.text}"</p>
                                    <p className="text-xs font-bold">— {t.name}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const BlogsSection = ({ onNavigate, onBlogClick }) => (
            <section className="py-24 bg-white">
                <div className="max-w-7xl mx-auto px-12 text-center mb-16">
                    <span className="badge-blue text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider mb-6 inline-block">Blogs</span>
                    <h2 className="text-5xl font-bold mb-4">Nos articles sur vos constructions</h2>
                    <button onClick={() => onNavigate('blogs')} className="text-sm font-semibold hover:underline bg-transparent border-none cursor-pointer">Voir tous nos articles →</button>
                </div>
                <div className="max-w-7xl mx-auto px-12 grid grid-cols-1 md:grid-cols-3 gap-8">
                    {blogsData.map((blog, idx) => (
                        <div key={idx} className="group cursor-pointer" onClick={() => onBlogClick(blog)}>
                            <div className="rounded-[2.5rem] overflow-hidden mb-6 h-64"><img src={blog.img} className="w-full h-full object-cover transition duration-500 group-hover:scale-105" /></div>
                            <span className="text-[10px] font-bold text-navy uppercase mb-3 block">{blog.category}</span>
                            <h4 className="text-xl font-bold mb-4">{blog.title}</h4>
                        </div>
                    ))}
                </div>
            </section>
        );

        const CTASection = () => (
            <section className="mx-12 mb-24 relative rounded-[60px] overflow-hidden bg-navy py-32 text-center text-white">
                <div className="relative z-10 max-w-2xl mx-auto px-6">
                    <div className="flex items-center justify-center space-x-1 mb-6">{[1, 2, 3, 4, 5].map(i => <i key={i} className="fas fa-star text-white text-[10px]"></i>)}</div>
                    <h2 className="text-6xl font-bold mb-6 tracking-tight">Build your dream project today with us</h2>
                    <button className="bg-white text-navy px-8 py-3 rounded-full text-sm font-bold flex items-center mx-auto transition-transform hover:scale-105"><span className="mr-2 w-1.5 h-1.5 bg-navy rounded-full"></span>Contact us</button>
                </div>
            </section>
        );

        const Footer = () => (
            <footer className="max-w-7xl mx-auto px-12 pb-24">
                <div className="bg-white rounded-[40px] p-16 border border-gray-50 flex flex-wrap justify-between shadow-sm">
                    <div className="max-w-xs mb-10"><div className="text-2xl font-extrabold tracking-tight mb-6">Brixora<span className="text-sm align-top">®</span></div><p className="text-gray-500 text-sm">A modern construction template for innovative projects.</p></div>
                    <div className="flex space-x-20">
                        <div><h5 className="font-bold text-sm mb-6">Pages</h5><ul className="space-y-4 text-gray-400 text-sm"><li>Home</li><li>About</li><li>Services</li></ul></div>
                        <div><h5 className="font-bold text-sm mb-6">Follow</h5><ul className="space-y-4 text-gray-400 text-sm"><li>Facebook</li><li>Linkedin</li><li>Twitter</li></ul></div>
                    </div>
                </div>
            </footer>
        );

        const MarqueeSection = () => {
            const items = ['Approche environnementale', 'Un style unique', 'Matériaux hauts de gammes', 'Artisanat Français'];
            const repeatedItems = [...items, ...items, ...items, ...items, ...items, ...items, ...items, ...items];
            return (
                <div className="w-full overflow-hidden bg-white pt-8 flex items-center mb-16">
                    <div className="flex animate-marquee w-max">
                        {repeatedItems.map((item, idx) => (
                            <div key={idx} className="flex items-center">
                                <span className="text-3xl font-medium text-gray-800 tracking-tight">{item}</span>
                                <i className="fas fa-asterisk text-navy mx-16 text-lg opacity-40"></i>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [selectedProject, setSelectedProject] = useState(null);
            const [selectedBlog, setSelectedBlog] = useState(null);

            useEffect(() => { window.scrollTo(0, 0); }, [view, selectedProject, selectedBlog]);

            const navigate = (v) => { setView(v); setSelectedProject(null); setSelectedBlog(null); };

            const handleNext = () => {
                const nextId = (selectedProject.id + 1) % projectsData.length;
                setSelectedProject(projectsData[nextId]);
            };

            const handlePrev = () => {
                const prevId = (selectedProject.id - 1 + projectsData.length) % projectsData.length;
                setSelectedProject(projectsData[prevId]);
            };

            const handleBlogClick = (blog) => {
                setSelectedBlog(blog);
                setView('blogDetail');
            };

            if (view === 'projectDetail' && selectedProject) {
                return (
                    <ProjectDetail 
                        project={selectedProject} 
                        onBack={() => setView('home')} 
                        onNavigate={navigate}
                        onNext={handleNext}
                        onPrev={handlePrev}
                    />
                );
            }
            if (view === 'blogDetail' && selectedBlog) {
                return <BlogDetail blog={selectedBlog} onBack={() => setView('blogs')} onNavigate={navigate} />;
            }
            if (view === 'blogs') {
                return <BlogsPage onNavigate={navigate} onBlogClick={handleBlogClick} />;
            }
            if (view === 'services') {
                return <ServicesPage onNavigate={navigate} />;
            }

            return (
                <div className="min-h-screen bg-white">
                    <Navbar onNavigate={navigate} />
                    <Hero />
                    <AboutSection />
                    <MarqueeSection />
                    <ServicesSection />
                    <ProjectsSection onProjectClick={(p) => { setSelectedProject(p); setView('projectDetail'); }} />
                    <WhyUsSection />
                    <TestimonialsSection />
                    <BlogsSection onNavigate={navigate} onBlogClick={handleBlogClick} />
                    <CTASection />
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
